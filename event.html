<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Détail d'un évènement en particuler.">
    <meta name="robots" content="noindex, nofollow"> <!-- Fictional website, indexing disabled -->
    <title>Détail de l'évènement - Villanova</title>

    <link rel="icon" type="image/x-icon" href="resources/img/favicon.ico">

    <link rel="stylesheet" href="resources/scss/event_styles.css">
    <script src="resources/script/script.js" defer></script>
    <script src="resources/script/event_script.js" defer></script>
</head>

<body>

    <header>
        <a href="./"><img src="resources/img/logo.webp" alt="Logo Villanova"></a>
    </header>

    <main>
        <!-- Hero Section -->
        <section class="hero-section">
            <div class="hero-content">
                <h1 class="event-title"></h1>
                <p class="event-date"></p>
            </div>
        </section>

        <div class="info-title">
            <h2>Détail de l'évènement</h2>
        </div>

        <!-- Event info container -->
        <section class="info-container"></section>
    </main>

    <footer>

        <button id="toggleFooterBtn">Nous Contacter</button>
        <section class="contact-section hidden">
            <h3>Contact</h3>
            <form id="contactForm">
                <div class="form-group">
                    <input type="text" id="nom" name="nom" placeholder="Nom" required>
                </div>
                <div class="form-group">
                    <input type="text" id="prenom" name="prenom" placeholder="Prénom" required>
                </div>
                <div class="form-group">
                    <input type="email" id="email" name="email" placeholder="Email" required>
                </div>
                <div class="form-group">
                    <textarea id="message" name="message" placeholder="Votre message" required></textarea>
                </div>
                <button type="submit">Envoyer</button>
            </form>
        </section>
        
        <p><span id="year"></span> © <a href="./">VillaNova</a> - Tous droits réservés</p>
    </footer>

</body>

</html>
