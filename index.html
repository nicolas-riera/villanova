<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Découvrez les meilleurs évènements culturels à VillaNova. Concerts, galas et expositions au cœur de la ville. Tout dans une seule plateforme.">
    <title>Villanova</title>

    <link rel="icon" type="image/x-icon" href="resources/img/favicon.ico">
    <link rel="stylesheet" href="resources/scss/styles.css">
    <link rel="stylesheet" href="resources/scss/event_card.css">
    <link rel="stylesheet" href="resources/styles/index_styles.css">
    <script src="resources/script/script.js" defer></script>
    <script src="resources/script/index_script.js" defer></script>
</head>

<body>

    <header>
        <a href="/"><img src="resources/img/logo.webp" alt="Logo Villanova"></a>
    </header>

    <main>
        <section class="hero-section">
            <div class="hero-content">
                <h1 class="hero-headline">Découvrez le meilleur de VillaNova</h1>

                <form onsubmit="return false;">
                    <div class="search-bar-container">
                        <input type="search" class="search-input" placeholder="Rechercher" name="q">
                        <img src="resources/img/magnifying_glass.webp" aria-hidden="true" alt="" class="search-icon">
                    </div>
                </form>
            </div>
        </section>

        <div class="event_title">
            <h2>Évènements à venir</h2>
        </div>

        <section id="events-container" class="events-grid"></section>
    </main>

    <footer>
        <p><span id="year"></span> © <a href="/">VillaNova</a> - Tous droits réservés</p>
    </footer>

</body>

</html>
